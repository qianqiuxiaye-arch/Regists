<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" width="180" height="40">
  <defs>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>

  <!-- Globe icon - white lines so it's visible on dark bg -->
  <g transform="translate(3, 4)">
    <circle cx="16" cy="16" r="14" fill="none" stroke="url(#logo-grad)" stroke-width="2"/>
    <ellipse cx="16" cy="16" rx="13" ry="5" fill="none" stroke="url(#logo-grad)" stroke-width="1.2" opacity="0.6"/>
    <ellipse cx="16" cy="12" rx="10" ry="3" fill="none" stroke="url(#logo-grad)" stroke-width="0.8" opacity="0.4"/>
    <ellipse cx="16" cy="20" rx="10" ry="3" fill="none" stroke="url(#logo-grad)" stroke-width="0.8" opacity="0.4"/>
    <line x1="16" y1="2" x2="16" y2="30" stroke="url(#logo-grad)" stroke-width="1.2" opacity="0.6"/>
    <!-- Three dots -->
    <circle cx="12" cy="10" r="3" fill="#22d3ee"/>
    <circle cx="20" cy="15" r="3" fill="#2dd4bf"/>
    <circle cx="10" cy="22" r="3" fill="#67e8f9"/>
    <!-- Arrow -->
    <line x1="23" y1="8" x2="29" y2="3" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="27,3 30,4 28,6" fill="none" stroke="#22d3ee" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Logo text - white for dark navbar -->
  <text x="44" y="18" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Regists</text>
  <text x="44" y="32" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.55)" letter-spacing="1">出海指南</text>

  <!-- Accent dot -->
  <circle cx="112" cy="15" r="2" fill="#22d3ee"/>
</svg>
